name: PayScript CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Soroban Contract Tests
  # Runs all 5 contract tests and verifies the Wasm build compiles
  # ─────────────────────────────────────────────────────────────────
  contract-tests:
    name: Soroban Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run contract tests
        run: cargo test --manifest-path contracts/payscript/Cargo.toml
        # This runs all 5 tests in test.rs and prints:
        # test result: ok. 5 passed; 0 failed

      # - name: Build Wasm contract
